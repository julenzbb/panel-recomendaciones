name: Build desktop apps

on:
  push:
    tags:
      - "v*"          # se dispara al crear un tag tipo v1.0.0
  workflow_dispatch:   # permite lanzarlo manualmente desde la pestaña Actions

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build (mac, solo zip)
        # En CI generamos solo el .zip de Mac: la creación de .dmg con hdiutil
        # falla en los runners virtualizados de GitHub ("Device not configured").
        # El .dmg se genera en local cuando haga falta.
        run: npx electron-builder --mac zip --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: panel-mac
          path: dist/*.zip
          if-no-files-found: warn

  build-win:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build (win)
        run: npx electron-builder --win --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          # Token solo para autenticar descargas y subir el rate-limit.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: panel-win
          path: |
            dist/*.exe
          if-no-files-found: warn

  release:
    needs: [build-mac, build-win]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
