<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3b82ff"/>
      <stop offset="1" stop-color="#1f57c9"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="22" flood-color="#0e1422" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- fondo redondeado estilo macOS -->
  <rect x="112" y="112" width="800" height="800" rx="180" ry="180" fill="url(#bg)"/>

  <!-- sliders / controles (panel de configuración) -->
  <g stroke="#ffffff" stroke-width="44" stroke-linecap="round" filter="url(#shadow)">
    <!-- fila 1 -->
    <line x1="300" y1="372" x2="724" y2="372"/>
    <!-- fila 2 -->
    <line x1="300" y1="512" x2="724" y2="512"/>
    <!-- fila 3 -->
    <line x1="300" y1="652" x2="724" y2="652"/>
  </g>

  <!-- mandos de los sliders -->
  <g fill="#ffffff" stroke="#1f57c9" stroke-width="20">
    <circle cx="420" cy="372" r="46"/>
    <circle cx="620" cy="512" r="46"/>
    <circle cx="468" cy="652" r="46"/>
  </g>
</svg>
